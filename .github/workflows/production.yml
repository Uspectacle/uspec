name: Deploy production 

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x]
    env:
      NEXT_PUBLIC_NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
      - name: Use node js
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}
      - name: Load Yarn cache
        uses: actions/cache@v2
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
      - name: Dependencies installation
        run: yarn
      - name: Add env variables
        run: |
          echo "    NEXT_PUBLIC_NODE_ENV: production" >> .ebextensions/options.config
          echo "    NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}" >> .ebextensions/options.config
      - name: Generate build
        run: npx nx build frontend --prod
      - name: Pick Procfile
        run: mv Procfile_Frontend ./dist/apps/frontend/Procfile
      - name: Generate deployment package
        run: cd dist/apps/frontend && zip -r deployfrontend.zip . -x '*.git*'
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        env:
          VERSION_LABEL: uspec-eb-front-${{ github.run_number }}
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: uspec-eb-front
          environment_name: Uspecebfront-env
          version_label: ${{ env.VERSION_LABEL }}
          region: eu-west-3
          deployment_package: dist/apps/frontend/deployfrontend.zip

