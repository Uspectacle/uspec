# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions /language-and-framework-guides/using-nodejs-with-github-actions

name: Deploy frontend stagging to EC2 Instance

on:
  push:
    branches: ['main']

env:
  test: test

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_NODE_ENV: stagging
      NEXT_PUBLIC_API_URL:

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 19

      - name: test echo
        run: echo 'hello'

      - name: test ls
        run: ls

      #   - name: Install Yarn, PM2
      #     run: npm install -g yarn pm2

      - name: Load Yarn cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Node Module
        run: yarn

      - name: Add env variables
        run: |
          echo "    NEXT_PUBLIC_NODE_ENV: production" >> .ebextensions/options.config
          echo "    NEXT_PUBLIC_API_URL: " >> .ebextensions/options.config

      - name: Generate build
        run: npx nx build frontend --prod

      - name: Pick Procfile
        run: mv Procfile_Frontend ./dist/apps/frontend/Procfile

      - name: Generate deployment package
        run: cd dist/apps/frontend && zip -r deployfrontend.zip . -x '*.git*'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Deploy to Elastic Beanstalk
        run: eb deploy Uspec-env
